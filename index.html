<!DOCTYPE html>

<html lang="hi">
<head>
<meta charset="UTF-8">
<title>DLP Institute Quiz</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    margin: 0;
    color: #fff;
}
.header {
    text-align: center;
    padding: 15px;
    background: #00000070;
    font-size: 22px;
    font-weight: bold;
}
.quiz-container {
    background: #fff;
    color: #000;
    max-width: 800px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 15px;
}
.option {
    display: block;
    padding: 10px;
    margin: 6px 0;
    background: #f1f1f1;
    border-radius: 8px;
}
button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    background: #1e3c72;
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
}
#timer { color: red; font-weight: bold; }
</style>

</head>

<body>

<div class="header">🎓 DLP Institute Quiz</div>

<div class="quiz-container">

<label>👤 Name:</label> <input type="text" id="name"><br><br>

<label>🏙 City:</label> <input type="text" id="city"><br><br>

<button onclick="startQuiz()">Start Quiz</button>

<div id="timer"></div>
<div id="progress"></div>
<div id="questionBox"></div>

<button onclick="prevQuestion()">Previous</button> <button onclick="nextQuestion()">Next</button>

<div id="result"></div>

</div>

<script>

const quizData = [

{q:"निम्न में से रासायनिक अभिक्रिया का उदाहरण कौन-सा है?",o:["बर्फ का पिघलना","दूध का दही बनना","जल का उबलना","मोम का पिघलना"],a:1},
{q:"मैग्नीशियम रिबन जलाने पर क्या बनता है?",o:["MgCl₂","MgO","MgSO₄","MgCO₃"],a:1},
{q:"रासायनिक समीकरण में अभिकारक कहाँ लिखे जाते हैं?",o:["दाईं ओर","बाईं ओर","ऊपर","नीचे"],a:1},
{q:"संतुलित समीकरण में क्या समान रहता है?",o:["ताप","द्रव्यमान","परमाणु","आयतन"],a:2},
{q:"Zn + HCl → ?",o:["ZnCl₂ + H₂","ZnO","Zn","ZnH₂"],a:0},

{q:"संयोजन अभिक्रिया क्या है?",o:["एक→अनेक","अनेक→एक","कोई नहीं","गैस"],a:1},
{q:"C + O₂ → CO₂ किस प्रकार की अभिक्रिया है?",o:["अपघटन","संयोजन","विस्थापन","द्विविस्थापन"],a:1},
{q:"CaO + H₂O → Ca(OH)₂ किस प्रकार की अभिक्रिया है?",o:["अपघटन","संयोजन","विस्थापन","द्विविस्थापन"],a:1},
{q:"ऊष्माक्षेपी अभिक्रिया में क्या होता है?",o:["ऊष्मा अवशोषित","ऊष्मा उत्सर्जित","गैस नहीं","रंग नहीं"],a:1},
{q:"अपघटन अभिक्रिया क्या है?",o:["एक→अनेक","अनेक→एक","कोई नहीं","गैस"],a:0},

{q:"CaCO₃ → CaO + CO₂ किस प्रकार की अभिक्रिया है?",o:["संयोजन","अपघटन","विस्थापन","द्विविस्थापन"],a:1},
{q:"जल का विद्युत अपघटन क्या कहलाता है?",o:["थर्मोलिसिस","इलेक्ट्रोलिसिस","फोटोलिसिस","ऑक्सीकरण"],a:1},
{q:"प्रकाश में अपघटन क्या कहलाता है?",o:["थर्मल","इलेक्ट्रो","फोटो","ऑक्सीकरण"],a:2},
{q:"Fe + CuSO₄ → FeSO₄ + Cu क्या है?",o:["संयोजन","अपघटन","विस्थापन","द्विविस्थापन"],a:2},
{q:"अधिक क्रियाशील धातु क्या करती है?",o:["स्वयं हटती","कम को हटाती","गैस","ताप"],a:1},

{q:"Na₂SO₄ + BaCl₂ → ?",o:["संयोजन","अपघटन","विस्थापन","द्विविस्थापन"],a:3},
{q:"BaSO₄ का रंग?",o:["पीला","सफेद","हरा","काला"],a:1},
{q:"ऑक्सीकरण क्या है?",o:["O हटना","O जुड़ना","e पाना","ताप"],a:1},
{q:"अपचयन क्या है?",o:["O जुड़ना","O हटना","e खोना","रंग"],a:1},
{q:"इलेक्ट्रॉन खोना?",o:["अपचयन","ऑक्सीकरण","संयोजन","अपघटन"],a:1},

{q:"इलेक्ट्रॉन पाना?",o:["ऑक्सीकरण","अपचयन","विस्थापन","संयोजन"],a:1},
{q:"जंग लगना?",o:["अपचयन","ऑक्सीकरण","संयोजन","अपघटन"],a:1},
{q:"Fe₂O₃ क्या है?",o:["जंग","गैस","अम्ल","लवण"],a:0},
{q:"ZnO + C → Zn (Zn का क्या होता है?)",o:["ऑक्सीकरण","अपचयन","संयोजन","विस्थापन"],a:1},
{q:"C का क्या होता है?",o:["अपचयन","ऑक्सीकरण","संयोजन","विघटन"],a:1},

{q:"अपचायक क्या करता है?",o:["ऑक्सीकरण","अपचयन","गैस","ताप"],a:1},
{q:"ऑक्सीकारक क्या करता है?",o:["अपचयन","ऑक्सीकरण","गैस","रंग"],a:1},
{q:"CO₂ बनने पर क्या निकलता है?",o:["प्रकाश","ऊष्मा","ध्वनि","कुछ नहीं"],a:1},
{q:"श्वसन किस प्रकार की अभिक्रिया है?",o:["ऊष्माशोषी","ऊष्माक्षेपी","अपघटन","संयोजन"],a:1},
{q:"CH₄ + O₂ → ?",o:["विस्थापन","दहन","अपघटन","द्विविस्थापन"],a:1},

{q:"FeSO₄ गरम करने पर रंग?",o:["नीला→हरा","हरा→भूरा","काला→सफेद","पीला→लाल"],a:1},
{q:"SO₂ की गंध?",o:["मीठी","तीक्ष्ण","सुगंध","नहीं"],a:1},
{q:"AgCl प्रकाश में?",o:["सफेद","काला","धूसर","नीला"],a:2},
{q:"AgCl → Ag + Cl₂ क्या है?",o:["संयोजन","अपघटन","विस्थापन","द्विविस्थापन"],a:1},
{q:"जंग के लिए आवश्यक?",o:["O₂","H₂O","दोनों","CO₂"],a:2},

{q:"संक्षारण क्या है?",o:["दही","जंग","उबलना","घुलना"],a:1},
{q:"विकृतिगंधिता किसमें?",o:["धातु","तेल","जल","गैस"],a:1},
{q:"एंटीऑक्सीडेंट क्या करते हैं?",o:["बढ़ाते","रोकते","ताप","गैस"],a:1},
{q:"BHA, BHT क्या हैं?",o:["अम्ल","क्षार","एंटीऑक्सीडेंट","लवण"],a:2},
{q:"नाइट्रोजन क्यों भरी जाती है?",o:["स्वाद","ऑक्सीकरण रोकने","रंग","गैस"],a:1},

{q:"द्रव्यमान संरक्षण का नियम किससे जुड़ा है?",o:["ऊर्जा","द्रव्यमान","ताप","गति"],a:1},
{q:"(s) का अर्थ?",o:["गैस","द्रव","ठोस","विलयन"],a:2},
{q:"(l) का अर्थ?",o:["ठोस","द्रव","गैस","विलयन"],a:1},
{q:"(g) का अर्थ?",o:["गैस","द्रव","ठोस","विलयन"],a:0},
{q:"(aq) का अर्थ?",o:["गैस","ठोस","जलीय","द्रव"],a:2},

{q:"Fe + H₂O → ?",o:["संयोजन","विस्थापन","अपघटन","द्विविस्थापन"],a:1},
{q:"Mg + O₂ → MgO?",o:["अपघटन","संयोजन","विस्थापन","द्विविस्थापन"],a:1},
{q:"2H₂ + O₂ → 2H₂O?",o:["संयोजन","अपघटन","विस्थापन","द्विविस्थापन"],a:0},
{q:"2KClO₃ → ?",o:["संयोजन","अपघटन","विस्थापन","दहन"],a:1},
{q:"रासायनिक परिवर्तन में क्या बनता है?",o:["वही","नया पदार्थ","कुछ नहीं","ताप"],a:1}

];

let index=0;
let answers=new Array(quizData.length).fill(null);
let totalTime=1500;
let timer;

function startQuiz(){
if(name.value==""||city.value==""){alert("Name & City डालो");return;}
loadQuestion();startTimer();
}

function loadQuestion(){
let q=quizData[index];
progress.innerText=`Question ${index+1}/50`;
let html=`<p>${q.q}</p>`;
q.o.forEach((opt,i)=>{
html+=`<label class="option"><input type="radio" name="opt" value="${i}" ${answers[index]==i?"checked":""}> ${opt}</label>`;
});
questionBox.innerHTML=html;
}

function nextQuestion(){saveAnswer(); if(index<49){index++;loadQuestion();}else submitQuiz();}
function prevQuestion(){saveAnswer(); if(index>0){index--;loadQuestion();}}

function saveAnswer(){
let sel=document.querySelector('input[name="opt"]:checked');
if(sel) answers[index]=parseInt(sel.value);
}

function submitQuiz(){
let score=0;
let review="";
answers.forEach((ans,i)=>{
let c=quizData[i].a;
if(ans===c) score++;
review+=`<p>${i+1}. ${quizData[i].q}<br>
Your: ${quizData[i].o[ans]||"Not Attempted"}<br>
Correct: ${quizData[i].o[c]}<br>
${ans===c?"✅":"❌"}</p><hr>`;
});

let msg=score>=45?"🏆 बहुत बढ़िया":score>=35?"👍 बहुत अच्छा":score>=25?"🙂 अच्छा":"❌ Try Again";

result.innerHTML=`<h2>Score: ${score}/50</h2>${msg}${review}`;
}

function startTimer(){
timer=setInterval(()=>{
let m=Math.floor(totalTime/60);
let s=totalTime%60;
timer.innerText=`Time Left: ${m}:${s<10?"0"+s:s}`;
totalTime--;
if(totalTime<0){clearInterval(timer);submitQuiz();}
},1000);
}

</script>

</body>
</html>
